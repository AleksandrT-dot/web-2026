<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&dis
    play=swap" rel="stylesheet">
    <link href= "home_style.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar__item-frame sidebar__item-frame-menu">
            <img class="sidebar__item" src="item_menu.png" alt="menu">
        </div>
        <div class="sidebar__item-frame sidebar__item-frame-user">
            <img class="sidebar__item" src="item_user.png" alt="user">
        </div>
        <div class="sidebar__item-frame sidebar__item-frame-plus">
            <img class="sidebar__item" src="item_plus.png" alt="add">
        </div>
    </div>
    <div class="net-feed">
        <div class="net-feed__post net-feed__post-up">
            <div class="net-feed__posting-user">
                <div class="net-feed__user">
                    <img class="net-feed__avatar" src="avatar_ivan.jpg" alt="unknown avatar">
                    <p class="net-feed__name">Ваня Денисов</p>
                </div>
                <img class="net-feed__item-edit" src="item_edit.png" alt="edit">
            </div>
            <img class="net-feed__posted-photo" src="photo_ivan.jpg" alt="photo ivan">
            <div class="net-feed__navigation-photo">
                <img class="net-feed__item net-feed__item_active" src="slider_active.png" alt="next">
                <img class="net-feed__item net-feed__item_unactive" src="slider_unactive.png" alt="prev">
                <img class="net-feed__item-num-page" src="item_num_page.png" alt="first">
            </div>
            <div class="net-feed__count-reaction">
                <img class="net-feed__reaction" src="reaction_like.png" alt="like">
                <p class="net-feed__count">203</p>    
            </div>
            <p class="net-feed__user-text">Так красиво сегодня на улице! Настоящая зима)) Вспоминается Бродский: «Поздно ночью, в уснувшей долине, на самом дне, в гор...» </p>
            <p class="net-feed__more">ещё</p>
            <p class="net-feed__time">2 часа назад</p>
        </div>
        <div class="net-feed__post net-feed__post-down">
            <div class="net-feed__posting-user">
                <div class="net-feed__user">
                    <img class="net-feed__avatar" src="avatar_liza.jpg" alt="unknown avatar">
                    <p class="net-feed__name">Лиза Дёмина</p>
                </div>
            </div>
            <img class="net-feed__posted-photo" src="photo_liza.jpg" alt="photo ivan">
            <div class="net-feed__count-reaction">
                <img class="net-feed__reaction" src="reaction_like.png" alt="like">
                <p class="net-feed__count">534</p>    
            </div>
            <p class="net-feed__time">1 день назад</p>
        </div>
    </div>
</body>
</html>
