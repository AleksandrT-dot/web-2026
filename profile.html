<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&dis
    play=swap" rel="stylesheet">

    <link href= "profile_style.css" rel = "stylesheet">
    <meta charset="UTF-8">
</head>
<body>
    <div class = "sidebar">
        <div class = "sidebar__item-frame sidebar__item-frame_menu">
            <img src = "item_menu.png" alt="menu" class = "sidebar__item">
        </div>
        <div class = "sidebar__item-frame sidebar__item-frame_user">
            <img src = "item_user.png" alt="user" class = "sidebar__item">
        </div>
        <div class = "sidebar__item-frame sidebar__item-frame_plus">
         <img src = "item_plus.png" alt="add" class = "sidebar__item">
        </div>
    </div>

    <div class = "head">
        <img src = "avatar_ivan.jpg" alt="unknown avatar" class = "head__avatar">
        <p class = "head__name">Ваня Денисов</p>
        <p class = "head__prescription">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</p>
        <div class = "head__count-posts">
            <img src = "item_image.png" alt="posts" class = "head__item">
             <p class = "head__count">43 поста</p>   
        </div>
    </div>
    <div class = "photo-block">
        <img src = "photo_ivan.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_ivan">
        <img src = "photo_bilding.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_bilding">
        <img src = "photo_cake.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_cake">
        
        <img src = "photo_party.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_party">
        <img src = "photo_coffee.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_coffee">
        <img src = "photo_book.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_book">

        <img src = "photo_sunny_day.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_sunny_day">
        <img src = "photo_friends.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_friends">
        <img src = "photo_pot.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_pot">

        <img src = "photo_bridge.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_bridge">
        <img src = "photo_sunrise.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_sunrise">
        <img src = "photo_mountains.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_mountains">

        <img src = "photo_night.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_night">
        <img src = "photo_sandwich.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_sandwich">
        <img src = "photo_flower.jpg" alt="unknown photo" class = "photo-block__photo photo-block__photo_flower">
    </div>

</html>
