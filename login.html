<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&dis
    play=swap" rel="stylesheet">

    <link href= "loginStyle.css" rel = "stylesheet">
</head>
<body>
    <img src = "Frame45.png" alt="Photo of a simple man" class = "user__image">
        <div class = "auth">
        <div class = "auth__fields">
            <div class = "auth__field">

                <label class="auth__label">Электропочта</label>
                <input type="text" class="auth__input auth__input--email">
                <p class = "auth__hint">Введите электропочту в формате *****@***.**</p>

            </div>
            <div class = "auth__field">
                <label class="auth__label">Пароль</label>
                <input type="text" class="auth__input auth__input--password">
                <div class = "auth__vision">
                    <img src = "Vector.png" alt="Vision" class = "auth__icon auth__icon--eye">
                    <img src = "Vector1.png" alt="Vision" class = "auth__icon auth__icon--slash">
                </div>
            </div>
        </div>
        <button class="auth__button">
            <span class ="auth__button-text">Продолжить</span>
        </button>
    </div>

    <h1 class = "page__title">Войти</h1>

</body>
</html>
