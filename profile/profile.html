<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&dis
    play=swap" rel="stylesheet">
    <link href= "profile_style.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar__item-frame sidebar__item-frame-menu">
            <img class="sidebar__item" src="item_menu.png" alt="menu">
        </div>
        <div class="sidebar__item-frame sidebar__item-frame-user">
            <img class="sidebar__item" src="item_user.png" alt="user">
        </div>
        <div class="sidebar__item-frame sidebar__item-frame-plus">
            <img class="sidebar__item" src="item_plus.png" alt="add">
        </div>
    </div>
    <form class="avatar-info">
        <img class="avatar-info__avatar" src="avatar_ivan.jpg" alt="unknown avatar">
        <p class="avatar-info__name">Ваня Денисов</p>
        <p class="avatar-info__prescription">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</p>
        <div class="avatar-info__count-posts">
            <img class="avatar-info__item" src="item_image.png" alt="posts">
            <p class="avatar-info__count">43 поста</p>   
        </div>
    </form>
    <form class="photo-grid">
        <img class="photo-grid__photo" src="photo_ivan.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_bilding.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_cake.jpg" alt="unknown photo">      
        <img class="photo-grid__photo" src="photo_party.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_coffee.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_book.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_sunny_day.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_friends.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_pot.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_bridge.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_sunrise.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_mountains.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_night.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_sandwich.jpg" alt="unknown photo">
        <img class="photo-grid__photo" src="photo_flower.jpg" alt="unknown photo">
    </form>
</body>
</html>
